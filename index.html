<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Mother's Day, Mommy 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose:  #c9847a;
      --blush: #f2ddd9;
      --cream: #fdf6f0;
      --gold:  #c4a882;
      --deep:  #3b2a28;
      --text:  #5c3d38;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── FALLING PETALS ── */
    .petal {
      position: fixed;
      border-radius: 50% 50% 50% 0 / 60% 60% 40% 40%;
      opacity: 0;
      animation: fall linear infinite;
      pointer-events: none;
      z-index: 999;
    }
    @keyframes fall {
      0%   { transform: translateY(-80px) rotate(0deg) translateX(0); opacity: 0; }
      8%   { opacity: 0.6; }
      50%  { transform: translateY(50vh) rotate(180deg) translateX(30px); }
      92%  { opacity: 0.4; }
      100% { transform: translateY(105vh) rotate(360deg) translateX(-20px); opacity: 0; }
    }

    /* ── BIRTHDAY LOCK SCREEN ── */
    #lock-screen {
      position: fixed;
      inset: 0;
      z-index: 5000;
      background:
        radial-gradient(ellipse 90% 60% at 50% -10%, #f5cec7 0%, transparent 65%),
        radial-gradient(ellipse 60% 50% at 90% 100%, #edddd0 0%, transparent 60%),
        var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    #lock-screen.unlocked {
      opacity: 0;
      transform: scale(1.04);
      pointer-events: none;
    }

    .lock-icon {
      font-size: 48px;
      margin-bottom: 24px;
      animation: sway 3s ease-in-out infinite;
    }
    @keyframes sway {
      0%,100% { transform: rotate(-8deg); }
      50%      { transform: rotate(8deg); }
    }

    .lock-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(28px, 8vw, 48px);
      color: var(--deep);
      margin-bottom: 10px;
    }

    .lock-sub {
      font-size: clamp(13px, 3.5vw, 15px);
      color: var(--gold);
      letter-spacing: 0.15em;
      margin-bottom: 40px;
    }

    .lock-label {
      font-size: 12px;
      letter-spacing: 0.2em;
      color: var(--rose);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .date-inputs {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      justify-content: center;
    }

    .date-inputs input {
      background: white;
      border: 1.5px solid var(--blush);
      border-radius: 8px;
      color: var(--deep);
      font-family: 'Jost', sans-serif;
      font-size: clamp(18px, 5vw, 24px);
      font-weight: 300;
      text-align: center;
      padding: 12px 8px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .date-inputs input:focus { border-color: var(--rose); }
    .date-inputs input.error  { border-color: #e07070; animation: shake 0.4s ease; }
    #inp-month { width: 64px; }
    #inp-day   { width: 56px; }
    #inp-year  { width: 88px; }

    .date-sep {
      font-size: 22px;
      color: var(--gold);
      line-height: 1;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }

    .lock-hint {
      font-size: 12px;
      color: var(--gold);
      letter-spacing: 0.1em;
      margin-bottom: 32px;
      min-height: 18px;
    }
    .lock-hint.err { color: #c47070; }

    .unlock-btn {
      background: linear-gradient(135deg, var(--rose), #b8706a);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 16px 48px;
      font-family: 'Jost', sans-serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 24px rgba(201,132,122,0.35);
      -webkit-tap-highlight-color: transparent;
    }
    .unlock-btn:hover  { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(201,132,122,0.45); }
    .unlock-btn:active { transform: scale(0.97); }

    /* ── HERO ── */
    .hero {
      position: relative;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 24px 100px;
      background:
        radial-gradient(ellipse 90% 60% at 50% -10%, #f5cec7 0%, transparent 65%),
        radial-gradient(ellipse 60% 50% at 90% 100%, #edddd0 0%, transparent 60%),
        var(--cream);
    }

    .hero-eyebrow {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(13px, 3.8vw, 17px);
      letter-spacing: 0.3em;
      color: var(--rose);
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp 1s 0.4s forwards;
    }
    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(64px, 18vw, 140px);
      line-height: 0.92;
      color: var(--deep);
      letter-spacing: -0.02em;
      opacity: 0;
      animation: fadeUp 1.1s 0.7s forwards;
    }
    .hero-title em { display: block; font-style: italic; color: var(--rose); }

    .hero-divider {
      margin: 36px auto;
      width: 60px; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      opacity: 0;
      animation: fadeUp 1s 1.1s forwards;
    }
    .hero-sub {
      font-size: clamp(14px, 3.5vw, 16px);
      letter-spacing: 0.15em;
      color: var(--gold);
      opacity: 0;
      animation: fadeUp 1s 1.3s forwards;
    }
    .scroll-hint {
      position: absolute;
      bottom: 36px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
      opacity: 0;
      animation: fadeUp 1s 2s forwards;
    }
    .scroll-hint span { font-size: 11px; letter-spacing: 0.25em; color: var(--rose); text-transform: uppercase; }
    .scroll-hint .arrow { width: 1px; height: 32px; background: linear-gradient(to bottom, var(--rose), transparent); animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

    /* ── SCRAPBOOK ── */
    .scrapbook { padding: 60px 16px 100px; max-width: 1000px; margin: 0 auto; }
    .scrapbook-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(28px, 7vw, 44px);
      color: var(--deep);
      text-align: center;
      margin-bottom: 48px;
    }

    .grid { columns: 2; column-gap: 12px; }
    @media (min-width: 560px) { .grid { columns: 3; column-gap: 14px; } }
    @media (min-width: 860px) { .grid { columns: 4; column-gap: 16px; } }

    .card {
      break-inside: avoid;
      margin-bottom: 12px;
      border-radius: 3px;
      overflow: hidden;
      cursor: pointer;
      opacity: 0;
      transition: transform 0.45s ease, box-shadow 0.45s ease, opacity 0.5s ease;
      background: var(--blush);
      box-shadow: 0 2px 8px rgba(59,42,40,0.08);
    }
    .card.visible { opacity: 1; }
    .card:nth-child(4n+1) { transform: rotate(-1.2deg); }
    .card:nth-child(4n+2) { transform: rotate(0.7deg); }
    .card:nth-child(4n+3) { transform: rotate(-0.4deg); }
    .card:nth-child(4n+4) { transform: rotate(1deg); }
    @media (hover: hover) {
      .card:hover { transform: rotate(0deg) translateY(-5px) scale(1.02) !important; box-shadow: 0 18px 48px rgba(59,42,40,0.2); z-index: 2; }
      .card:hover img { transform: scale(1.05); }
    }
    .card:active { transform: scale(0.97) !important; }
    .card img { width: 100%; display: block; object-fit: cover; transition: transform 0.5s ease; }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed; inset: 0;
      background: rgba(28,16,14,0.93);
      z-index: 4000;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .lightbox.open { opacity: 1; pointer-events: all; }
    .lightbox img {
      max-width: 100%; max-height: 88svh;
      border-radius: 3px; object-fit: contain;
      transform: scale(0.9);
      transition: transform 0.35s cubic-bezier(0.34,1.4,0.64,1), opacity 0.2s ease;
      box-shadow: 0 40px 100px rgba(0,0,0,0.6);
    }
    .lightbox.open img { transform: scale(1); }
    .lb-btn {
      position: absolute;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      color: #f2ddd9; border-radius: 50%;
      width: 46px; height: 46px; font-size: 22px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .lb-btn:hover { background: rgba(255,255,255,0.18); }
    #lb-close { top: 18px; right: 20px; font-size: 18px; }
    #lb-prev  { left: 12px; top: 50%; transform: translateY(-50%); }
    #lb-next  { right: 12px; top: 50%; transform: translateY(-50%); }

    .loading, .empty {
      text-align: center; padding: 60px 24px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 22px; color: var(--gold);
    }

    footer {
      text-align: center; padding: 40px 24px 70px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(17px, 4.5vw, 24px);
      color: var(--rose);
    }
  </style>
</head>
<body>

  <!-- BIRTHDAY LOCK -->
  <div id="lock-screen">
    <div class="lock-icon">🌸</div>
    <h1 class="lock-title">A gift just for you</h1>
    <p class="lock-sub">Enter your birthday to unlock</p>
    <p class="lock-label">Month &nbsp;/&nbsp; Day &nbsp;/&nbsp; Year</p>
    <div class="date-inputs">
      <input id="inp-month" type="tel" maxlength="2" placeholder="MM" inputmode="numeric" />
      <span class="date-sep">/</span>
      <input id="inp-day" type="tel" maxlength="2" placeholder="DD" inputmode="numeric" />
      <span class="date-sep">/</span>
      <input id="inp-year" type="tel" maxlength="4" placeholder="YYYY" inputmode="numeric" />
    </div>
    <p class="lock-hint" id="lock-hint">&nbsp;</p>
    <button class="unlock-btn" onclick="tryUnlock()">Open My Gift ♡</button>
  </div>

  <!-- HERO -->
  <section class="hero">
    <p class="hero-eyebrow">with all my heart</p>
    <h1 class="hero-title">Happy<br>Mother's<br><em>Day</em></h1>
    <div class="hero-divider"></div>
    <p class="hero-sub">Mommy &nbsp;🌸</p>
    <div class="scroll-hint">
      <span>our memories</span>
      <div class="arrow"></div>
    </div>
  </section>

  <!-- SCRAPBOOK -->
  <section class="scrapbook">
    <h2 class="scrapbook-title">A little piece of us ♡</h2>
    <div class="grid" id="grid">
      <div class="loading">Loading memories…</div>
    </div>
  </section>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <button class="lb-btn" id="lb-close">✕</button>
    <button class="lb-btn" id="lb-prev">‹</button>
    <img id="lb-img" src="" alt="Memory" />
    <button class="lb-btn" id="lb-next">›</button>
  </div>

  <footer>I love you more than words can say ♡</footer>

  <script>
    /* ── PETALS ── */
    const PETAL_COLORS = ['#e8a9a2','#d4887f','#c4a882','#f2c4be','#dbb89a','#e8c5bb'];
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'petal';
      const s = 9 + Math.random() * 13;
      Object.assign(p.style, {
        width: s + 'px', height: (s * 1.45) + 'px',
        left: (Math.random() * 100) + 'vw',
        background: PETAL_COLORS[Math.floor(Math.random() * PETAL_COLORS.length)],
        animationDuration: (6 + Math.random() * 9) + 's',
        animationDelay: (Math.random() * 10) + 's',
        transform: `rotate(${Math.random()*360}deg)`
      });
      document.body.appendChild(p);
    }

    /* ── BIRTHDAY LOCK ── */
    // June 3 1989 → month=6, day=3, year=1989
    const CORRECT = { month: 6, day: 3, year: 1989 };

    // Auto-advance between inputs
    document.getElementById('inp-month').addEventListener('input', e => {
      if (e.target.value.length === 2) document.getElementById('inp-day').focus();
    });
    document.getElementById('inp-day').addEventListener('input', e => {
      if (e.target.value.length === 2) document.getElementById('inp-year').focus();
    });
    document.getElementById('inp-year').addEventListener('keydown', e => {
      if (e.key === 'Enter') tryUnlock();
    });

    function tryUnlock() {
      const m = parseInt(document.getElementById('inp-month').value);
      const d = parseInt(document.getElementById('inp-day').value);
      const y = parseInt(document.getElementById('inp-year').value);
      const hint = document.getElementById('lock-hint');

      if (m === CORRECT.month && d === CORRECT.day && y === CORRECT.year) {
        hint.textContent = '♡ Welcome, Mommy ♡';
        hint.classList.remove('err');
        setTimeout(() => {
          document.getElementById('lock-screen').classList.add('unlocked');
          setTimeout(() => document.getElementById('lock-screen').style.display = 'none', 900);
        }, 600);
      } else {
        hint.textContent = 'Hmm, try again 🌸';
        hint.classList.add('err');
        ['inp-month','inp-day','inp-year'].forEach(id => {
          const el = document.getElementById(id);
          el.classList.add('error');
          setTimeout(() => el.classList.remove('error'), 500);
        });
      }
    }

    /* ── R2 PHOTOS ── */
    const R2_BASE = 'https://pub-22c998ef5ee3421596829eb57e899b4a.r2.dev';
    let photos = [];
    let current = 0;

    async function loadPhotos() {
      const grid = document.getElementById('grid');
      try {
        const res = await fetch(`${R2_BASE}/photos.json`);
        if (!res.ok) throw new Error();
        const raw = await res.json();
        photos = (Array.isArray(raw) ? raw : [raw])
          .filter(f => /\.(jpg|jpeg|png|webp|gif)$/i.test(f));

        if (!photos.length) {
          grid.innerHTML = '<div class="empty">Upload photos to R2 and add photos.json 🌸</div>';
          return;
        }

        grid.innerHTML = '';
        photos.forEach((name, i) => {
          const card = document.createElement('div');
          card.className = 'card';
          const img = document.createElement('img');
          img.src = `${R2_BASE}/${name}`;
          img.alt = 'Memory ' + (i + 1);
          img.loading = 'lazy';
          card.appendChild(img);
          card.addEventListener('click', () => openLB(i));
          grid.appendChild(card);
        });

        const io = new IntersectionObserver((entries) => {
          entries.forEach((e, idx) => {
            if (e.isIntersecting) {
              setTimeout(() => e.target.classList.add('visible'), idx * 55);
              io.unobserve(e.target);
            }
          });
        }, { threshold: 0.08 });
        document.querySelectorAll('.card').forEach(c => io.observe(c));

      } catch {
        grid.innerHTML = '<div class="empty">Upload photos and photos.json to your R2 bucket 🌸</div>';
      }
    }

    /* ── LIGHTBOX ── */
    const lb    = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');

    function openLB(i) {
      current = i;
      lbImg.src = `${R2_BASE}/${photos[current]}`;
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLB() {
      lb.classList.remove('open');
      document.body.style.overflow = '';
      setTimeout(() => lbImg.src = '', 300);
    }
    function prevLB() {
      current = (current - 1 + photos.length) % photos.length;
      lbImg.style.opacity = '0';
      setTimeout(() => { lbImg.src = `${R2_BASE}/${photos[current]}`; lbImg.style.opacity = '1'; }, 140);
    }
    function nextLB() {
      current = (current + 1) % photos.length;
      lbImg.style.opacity = '0';
      setTimeout(() => { lbImg.src = `${R2_BASE}/${photos[current]}`; lbImg.style.opacity = '1'; }, 140);
    }

    document.getElementById('lb-close').onclick = closeLB;
    document.getElementById('lb-prev').onclick  = prevLB;
    document.getElementById('lb-next').onclick  = nextLB;
    lb.addEventListener('click', e => { if (e.target === lb) closeLB(); });
    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') closeLB();
      if (e.key === 'ArrowLeft') prevLB();
      if (e.key === 'ArrowRight') nextLB();
    });
    let tx = 0;
    lb.addEventListener('touchstart', e => tx = e.touches[0].clientX, { passive: true });
    lb.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - tx;
      if (Math.abs(dx) > 45) dx < 0 ? nextLB() : prevLB();
    });

    loadPhotos();
  </script>
</body>
</html>
